services:
  db:
    image: postgres:16-alpine
    container_name: rfc-rag-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rfc_rag_dev}
      POSTGRES_USER: ${POSTGRES_USER:-rfc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_DEV_PORT:-5433}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata_dev:
