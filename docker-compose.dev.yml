services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rfc-rag-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rfc_rag_dev}
      POSTGRES_USER: ${POSTGRES_USER:-rfc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_DEV_PORT:-5433}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: rfc-rag-redis-dev
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_redis_password}
      REDIS_ARGS: "--appendonly yes --requirepass ${REDIS_PASSWORD:-dev_redis_password} --protected-mode yes"
    ports:
      - "127.0.0.1:${REDIS_DEV_PORT:-6379}:6379"
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata_dev:
  redisdata_dev:
