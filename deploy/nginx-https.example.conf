# Example HTTPS reverse proxy for RFC-RAG-Agent.
# Replace rfc-rag.example.com and certificate paths before use.

server {
    listen 80;
    server_name rfc-rag.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rfc-rag.example.com;

    ssl_certificate /etc/letsencrypt/live/rfc-rag.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rfc-rag.example.com/privkey.pem;

    client_max_body_size 32m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://127.0.0.1:8000;
    }

    location /agent/query/stream {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:8000;
    }
}
