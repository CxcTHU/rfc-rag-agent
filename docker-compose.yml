services:
  rfc-rag-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: rfc-rag-agent:phase39-production-deployment
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite:////app/data/app.sqlite
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
