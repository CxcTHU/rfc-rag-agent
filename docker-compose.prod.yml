services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rfc_rag}
      POSTGRES_USER: ${POSTGRES_USER:-rfc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.prod}
      REDIS_ARGS: "--appendonly yes --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.prod} --protected-mode yes"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    image: rfc-rag-agent:production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    network_mode: host
    env_file:
      - path: .env.prod
        required: false
    environment:
      APP_ENV: production
      AUTH_ENABLED: "true"
      AUTH_REQUIRED_IN_PROD: "true"
      AUTH_ALLOW_PUBLIC_REGISTRATION: "false"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUIRED_IN_PROD: "true"
      TRUST_FORWARDED_FOR: "false"
      SOURCE_SYNC_ALLOWED_ROOTS: /app/data
      EXPORT_ALLOWED_DIR: /app/data/evaluation
      TABLE_RAG_ENABLED: ${TABLE_RAG_ENABLED:-false}
      AGENT_DEFAULT_MODE: ${AGENT_DEFAULT_MODE:-tool_calling_agent}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-rfc_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}@127.0.0.1:${POSTGRES_HOST_PORT:-15432}/${POSTGRES_DB:-rfc_rag}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.prod}@127.0.0.1:${REDIS_HOST_PORT:-16379}/0}
      RAW_DATA_DIR: /app/data/raw
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env.prod}
      PLANNER_CHAT_MODEL_PROVIDER: ${PLANNER_CHAT_MODEL_PROVIDER:?set PLANNER_CHAT_MODEL_PROVIDER in .env.prod}
      PLANNER_CHAT_MODEL_NAME: ${PLANNER_CHAT_MODEL_NAME:?set PLANNER_CHAT_MODEL_NAME in .env.prod}
      PLANNER_CHAT_MODEL_API_KEY: ${PLANNER_CHAT_MODEL_API_KEY:?set PLANNER_CHAT_MODEL_API_KEY in .env.prod}
      PLANNER_CHAT_MODEL_BASE_URL: ${PLANNER_CHAT_MODEL_BASE_URL:?set PLANNER_CHAT_MODEL_BASE_URL in .env.prod}
      PLANNER_CHAT_MODEL_TEMPERATURE: ${PLANNER_CHAT_MODEL_TEMPERATURE:-0}
      PLANNER_CHAT_MODEL_TIMEOUT_SECONDS: ${PLANNER_CHAT_MODEL_TIMEOUT_SECONDS:-10}
    volumes:
      - ./data:/app/data
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8000}",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${APP_PORT:-8000}/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
